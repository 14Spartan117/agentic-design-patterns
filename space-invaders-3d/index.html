<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Space Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060f; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    font-family: "Courier New", monospace;
    color: #7df9ff;
    text-shadow: 0 0 8px rgba(125, 249, 255, 0.8);
    font-size: 20px;
    letter-spacing: 2px;
    pointer-events: none;
    user-select: none;
    z-index: 10;
  }
  #hud .stat { display: flex; gap: 8px; align-items: center; }
  #lives { color: #ff5d73; text-shadow: 0 0 8px rgba(255, 93, 115, 0.8); }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: "Courier New", monospace;
    color: #e6f7ff;
    background: radial-gradient(circle at 50% 40%, rgba(15, 22, 55, 0.85), rgba(2, 3, 10, 0.96));
    z-index: 20;
    gap: 18px;
    padding: 24px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(34px, 7vw, 72px);
    letter-spacing: 6px;
    color: #7df9ff;
    text-shadow: 0 0 18px rgba(125, 249, 255, 0.9);
  }
  .overlay h2 {
    font-size: clamp(22px, 4vw, 38px);
    letter-spacing: 3px;
  }
  .overlay p { font-size: 16px; line-height: 1.9; color: #9fb3c8; max-width: 520px; }
  .overlay .key {
    display: inline-block;
    border: 1px solid #3a4d6b;
    border-radius: 6px;
    padding: 2px 10px;
    margin: 0 2px;
    color: #7df9ff;
    background: rgba(125, 249, 255, 0.06);
  }
  .overlay button {
    margin-top: 12px;
    font-family: inherit;
    font-size: 20px;
    letter-spacing: 3px;
    color: #05060f;
    background: #7df9ff;
    border: none;
    border-radius: 8px;
    padding: 14px 38px;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(125, 249, 255, 0.6);
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  .overlay button:hover { transform: scale(1.05); box-shadow: 0 0 36px rgba(125, 249, 255, 0.9); }
  #finalScore { color: #ffd166; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="stat">SCORE <span id="score">0</span></div>
    <div class="stat">WAVE <span id="wave">1</span></div>
    <div class="stat" id="lives">LIVES <span id="livesCount">3</span></div>
  </div>

  <div id="startScreen" class="overlay">
    <h1>3D SPACE INVADERS</h1>
    <p>
      Defend the galaxy. Blast the descending swarm before it reaches you.<br /><br />
      <span class="key">&larr;</span> <span class="key">&rarr;</span> or <span class="key">A</span> <span class="key">D</span> to move<br />
      <span class="key">SPACE</span> to fire
    </p>
    <button id="startBtn">START</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h1 id="gameOverTitle">GAME OVER</h1>
    <h2>SCORE <span id="finalScore">0</span></h2>
    <p id="gameOverMsg"></p>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from "three";

  // ---------------------------------------------------------------------------
  // World configuration
  // ---------------------------------------------------------------------------
  const BOUND_X = 14;          // how far the player can move sideways
  const PLAYER_Z = 16;         // player's fixed depth (camera looks toward -Z)
  const INVADER_ROWS = 4;
  const INVADER_COLS = 8;
  const INVADER_SPACING_X = 3.2;
  const INVADER_SPACING_Z = 2.6;
  const INVADER_START_Z = -18;
  const PLAYER_SPEED = 18;
  const PLAYER_BULLET_SPEED = 44;
  const ENEMY_BULLET_SPEED = 20;
  const PLAYER_FIRE_COOLDOWN = 0.26;
  const LOSE_LINE_Z = PLAYER_Z + 1; // invaders reaching here end the game

  // ---------------------------------------------------------------------------
  // Renderer / scene / camera
  // ---------------------------------------------------------------------------
  const app = document.getElementById("app");
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  app.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060f);
  scene.fog = new THREE.Fog(0x05060f, 36, 78);

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    220
  );
  camera.position.set(0, 17, 32);
  camera.lookAt(0, 0, -4);

  // ---------------------------------------------------------------------------
  // Lighting
  // ---------------------------------------------------------------------------
  scene.add(new THREE.AmbientLight(0x404f7a, 1.1));
  const keyLight = new THREE.DirectionalLight(0x9fd0ff, 1.2);
  keyLight.position.set(6, 20, 14);
  scene.add(keyLight);
  const rimLight = new THREE.PointLight(0x7df9ff, 1.6, 90);
  rimLight.position.set(0, 8, 18);
  scene.add(rimLight);

  // ---------------------------------------------------------------------------
  // Starfield + floor grid
  // ---------------------------------------------------------------------------
  function makeStarfield() {
    const count = 1400;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 180;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 120 - 8;
      positions[i * 3 + 2] = -Math.random() * 180 + 20;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0x9fb3ff,
      size: 0.45,
      transparent: true,
      opacity: 0.9,
      sizeAttenuation: true,
    });
    return new THREE.Points(geo, mat);
  }
  const stars = makeStarfield();
  scene.add(stars);

  const grid = new THREE.GridHelper(140, 70, 0x1d3b66, 0x12233f);
  grid.position.y = -3;
  scene.add(grid);

  // ---------------------------------------------------------------------------
  // Player ship
  // ---------------------------------------------------------------------------
  function makePlayer() {
    const group = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x39ff8c, emissive: 0x0c3322, metalness: 0.4, roughness: 0.35,
    });
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.9, 2.8, 8), bodyMat);
    body.rotation.x = -Math.PI / 2; // nose points toward -Z (into the swarm)
    group.add(body);

    const wingMat = new THREE.MeshStandardMaterial({
      color: 0x1fd1ff, emissive: 0x05303a, metalness: 0.5, roughness: 0.4,
    });
    const wing = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.3, 1.1), wingMat);
    wing.position.z = 0.7;
    group.add(wing);

    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x7df9ff, emissiveIntensity: 1.6 })
    );
    glow.position.set(0, 0.3, -0.4);
    group.add(glow);

    // engine flare
    const flare = new THREE.Mesh(
      new THREE.ConeGeometry(0.35, 1.2, 8),
      new THREE.MeshBasicMaterial({ color: 0xffae42, transparent: true, opacity: 0.85 })
    );
    flare.rotation.x = Math.PI / 2;
    flare.position.z = 1.6;
    group.add(flare);
    group.userData.flare = flare;

    return group;
  }
  const player = makePlayer();
  player.position.set(0, 0, PLAYER_Z);
  scene.add(player);

  // ---------------------------------------------------------------------------
  // Invader factory
  // ---------------------------------------------------------------------------
  const invaderGeo = new THREE.IcosahedronGeometry(0.95, 0);
  function makeInvader(color) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: new THREE.Color(color).multiplyScalar(0.25),
      metalness: 0.3, roughness: 0.45, flatShading: true,
    });
    const core = new THREE.Mesh(invaderGeo, mat);
    group.add(core);

    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xff2d55, emissiveIntensity: 1.4 });
    for (const dx of [-0.32, 0.32]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 10), eyeMat);
      eye.position.set(dx, 0.18, -0.78);
      group.add(eye);
    }
    group.userData.core = core;
    return group;
  }

  // ---------------------------------------------------------------------------
  // Object pools (bullets) and live entity lists
  // ---------------------------------------------------------------------------
  let invaders = [];
  let playerBullets = [];
  let enemyBullets = [];
  let particles = [];

  const playerBulletGeo = new THREE.CylinderGeometry(0.14, 0.14, 1.6, 8);
  const playerBulletMat = new THREE.MeshBasicMaterial({ color: 0x7dff9c });
  const enemyBulletGeo = new THREE.SphereGeometry(0.32, 10, 10);
  const enemyBulletMat = new THREE.MeshBasicMaterial({ color: 0xff5d73 });

  function spawnPlayerBullet() {
    const b = new THREE.Mesh(playerBulletGeo, playerBulletMat);
    b.rotation.x = Math.PI / 2;
    b.position.copy(player.position);
    b.position.z -= 1.4;
    scene.add(b);
    playerBullets.push(b);
  }

  function spawnEnemyBullet(from) {
    const b = new THREE.Mesh(enemyBulletGeo, enemyBulletMat);
    b.position.copy(from.position);
    b.position.z += 0.8;
    scene.add(b);
    enemyBullets.push(b);
  }

  // ---------------------------------------------------------------------------
  // Explosion particles
  // ---------------------------------------------------------------------------
  const particleGeo = new THREE.SphereGeometry(0.18, 6, 6);
  function spawnExplosion(pos, color) {
    for (let i = 0; i < 14; i++) {
      const m = new THREE.Mesh(particleGeo, new THREE.MeshBasicMaterial({ color, transparent: true }));
      m.position.copy(pos);
      m.userData.vel = new THREE.Vector3(
        (Math.random() - 0.5) * 16,
        (Math.random() - 0.5) * 16,
        (Math.random() - 0.5) * 16
      );
      m.userData.life = 0.6;
      scene.add(m);
      particles.push(m);
    }
  }

  // ---------------------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------------------
  const state = {
    running: false,
    score: 0,
    wave: 1,
    lives: 3,
    swarmDir: 1,          // +1 right, -1 left
    swarmSpeed: 3.2,      // sideways units/sec
    descendStep: 1.4,     // how far the swarm steps toward player on edge hit
    enemyFireTimer: 0,
    enemyFireInterval: 1.4,
    fireCooldown: 0,
  };

  const ui = {
    score: document.getElementById("score"),
    wave: document.getElementById("wave"),
    lives: document.getElementById("livesCount"),
    startScreen: document.getElementById("startScreen"),
    gameOverScreen: document.getElementById("gameOverScreen"),
    finalScore: document.getElementById("finalScore"),
    gameOverTitle: document.getElementById("gameOverTitle"),
    gameOverMsg: document.getElementById("gameOverMsg"),
  };

  function syncHud() {
    ui.score.textContent = state.score;
    ui.wave.textContent = state.wave;
    ui.lives.textContent = state.lives;
  }

  // ---------------------------------------------------------------------------
  // Wave spawning
  // ---------------------------------------------------------------------------
  const ROW_COLORS = [0xff5d73, 0xffae42, 0x7df9ff, 0xb388ff];

  function clearList(list) {
    for (const o of list) scene.remove(o);
    list.length = 0;
  }

  function spawnWave() {
    clearList(invaders);
    const offsetX = ((INVADER_COLS - 1) * INVADER_SPACING_X) / 2;
    for (let r = 0; r < INVADER_ROWS; r++) {
      for (let c = 0; c < INVADER_COLS; c++) {
        const inv = makeInvader(ROW_COLORS[r % ROW_COLORS.length]);
        inv.position.set(
          c * INVADER_SPACING_X - offsetX,
          0,
          INVADER_START_Z + r * INVADER_SPACING_Z
        );
        inv.userData.points = (INVADER_ROWS - r) * 10;
        inv.userData.phase = Math.random() * Math.PI * 2;
        scene.add(inv);
        invaders.push(inv);
      }
    }
    state.swarmSpeed = 3.2 + (state.wave - 1) * 0.9;
    state.enemyFireInterval = Math.max(0.45, 1.4 - (state.wave - 1) * 0.12);
  }

  // ---------------------------------------------------------------------------
  // Input
  // ---------------------------------------------------------------------------
  const keys = { left: false, right: false, fire: false };
  window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
    if (e.code === "Space") { keys.fire = true; e.preventDefault(); }
  });
  window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
    if (e.code === "Space") keys.fire = false;
  });

  // ---------------------------------------------------------------------------
  // Game flow
  // ---------------------------------------------------------------------------
  function startGame() {
    state.running = true;
    state.score = 0;
    state.wave = 1;
    state.lives = 3;
    state.swarmDir = 1;
    state.fireCooldown = 0;
    state.enemyFireTimer = 0;
    player.position.set(0, 0, PLAYER_Z);
    clearList(playerBullets);
    clearList(enemyBullets);
    clearList(particles);
    spawnWave();
    syncHud();
    ui.startScreen.classList.add("hidden");
    ui.gameOverScreen.classList.add("hidden");
  }

  function endGame(won) {
    state.running = false;
    ui.finalScore.textContent = state.score;
    ui.gameOverTitle.textContent = won ? "YOU WIN!" : "GAME OVER";
    ui.gameOverMsg.textContent = won
      ? "You cleared the swarm. The galaxy is safe... for now."
      : "The swarm overwhelmed your defenses.";
    ui.gameOverScreen.classList.remove("hidden");
  }

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("restartBtn").addEventListener("click", startGame);

  // ---------------------------------------------------------------------------
  // Collision helper (cheap distance check)
  // ---------------------------------------------------------------------------
  function hitTest(a, b, radius) {
    return a.position.distanceToSquared(b.position) < radius * radius;
  }

  // ---------------------------------------------------------------------------
  // Update loop
  // ---------------------------------------------------------------------------
  function update(dt, t) {
    // Animated background regardless of running state
    stars.rotation.z += dt * 0.01;
    player.userData.flare.scale.y = 0.7 + Math.sin(t * 30) * 0.3;

    if (!state.running) return;

    // --- Player movement ---
    if (keys.left) player.position.x -= PLAYER_SPEED * dt;
    if (keys.right) player.position.x += PLAYER_SPEED * dt;
    player.position.x = THREE.MathUtils.clamp(player.position.x, -BOUND_X, BOUND_X);
    player.rotation.z = THREE.MathUtils.lerp(
      player.rotation.z,
      (keys.left ? 0.35 : 0) - (keys.right ? 0.35 : 0),
      0.2
    );

    // --- Player firing ---
    state.fireCooldown -= dt;
    if (keys.fire && state.fireCooldown <= 0) {
      spawnPlayerBullet();
      state.fireCooldown = PLAYER_FIRE_COOLDOWN;
    }

    // --- Swarm movement (move sideways, step toward player at edges) ---
    let minX = Infinity, maxX = -Infinity, maxZ = -Infinity;
    for (const inv of invaders) {
      inv.position.x += state.swarmDir * state.swarmSpeed * dt;
      inv.userData.phase += dt * 3;
      inv.position.y = Math.sin(inv.userData.phase) * 0.4;
      inv.rotation.y += dt * 1.2;
      minX = Math.min(minX, inv.position.x);
      maxX = Math.max(maxX, inv.position.x);
      maxZ = Math.max(maxZ, inv.position.z);
    }
    if (invaders.length && (maxX > BOUND_X + 3 || minX < -BOUND_X - 3)) {
      state.swarmDir *= -1;
      for (const inv of invaders) inv.position.z += state.descendStep;
    }
    if (maxZ >= LOSE_LINE_Z) { endGame(false); return; }

    // --- Enemy firing (random front-line invader shoots) ---
    state.enemyFireTimer -= dt;
    if (state.enemyFireTimer <= 0 && invaders.length) {
      const shooter = invaders[Math.floor(Math.random() * invaders.length)];
      spawnEnemyBullet(shooter);
      state.enemyFireTimer = state.enemyFireInterval * (0.6 + Math.random() * 0.8);
    }

    // --- Player bullets ---
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      b.position.z -= PLAYER_BULLET_SPEED * dt;
      let consumed = false;
      for (let j = invaders.length - 1; j >= 0; j--) {
        const inv = invaders[j];
        if (hitTest(b, inv, 1.25)) {
          spawnExplosion(inv.position, inv.userData.core.material.color.getHex());
          state.score += inv.userData.points;
          scene.remove(inv);
          invaders.splice(j, 1);
          consumed = true;
          break;
        }
      }
      if (consumed || b.position.z < INVADER_START_Z - 12) {
        scene.remove(b);
        playerBullets.splice(i, 1);
      }
    }

    // --- Enemy bullets ---
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.position.z += ENEMY_BULLET_SPEED * dt;
      if (hitTest(b, player, 1.3)) {
        spawnExplosion(player.position, 0xff5d73);
        scene.remove(b);
        enemyBullets.splice(i, 1);
        state.lives -= 1;
        syncHud();
        if (state.lives <= 0) { endGame(false); return; }
        continue;
      }
      if (b.position.z > PLAYER_Z + 6) {
        scene.remove(b);
        enemyBullets.splice(i, 1);
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.userData.life -= dt;
      p.position.addScaledVector(p.userData.vel, dt);
      p.material.opacity = Math.max(0, p.userData.life / 0.6);
      if (p.userData.life <= 0) {
        scene.remove(p);
        particles.splice(i, 1);
      }
    }

    syncHud();

    // --- Wave cleared ---
    if (invaders.length === 0) {
      if (state.wave >= 5) { endGame(true); return; }
      state.wave += 1;
      state.lives = Math.min(state.lives + 1, 5); // bonus life
      clearList(enemyBullets);
      spawnWave();
      syncHud();
    }
  }

  // ---------------------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------------------
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    update(dt, clock.elapsedTime);
    renderer.render(scene, camera);
  }
  animate();

  // ---------------------------------------------------------------------------
  // Resize
  // ---------------------------------------------------------------------------
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  </script>
</body>
</html>
